<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if product %}Edit Product{% else %}Add Product{% endif %} - Car Accessories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-header h2 {
            color: #333;
            font-weight: 700;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
        }
        .form-label {
            font-weight: 600;
            color: #555;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            color: white;
            font-weight: 600;
        }
        .btn-submit:hover {
            opacity: 0.9;
        }
        .btn-back {
            background: #6c757d;
            border: none;
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="form-card">
        <div class="form-header">
            <h2>{% if product %}Edit Product{% else %}Add New Product{% endif %}</h2>
            <p class="text-muted">Car Accessories Management</p>
        </div>
        <form method="POST" action="{% if product %}/admin/products/edit/{{ product.id }}{% else %}/admin/products/add{% endif %}">
            <div class="mb-3">
                <label for="name" class="form-label">Product Name</label>
                <input type="text" class="form-control" id="name" name="name" 
                       value="{% if product %}{{ product.name }}{% endif %}" required>
            </div>
            <div class="mb-3">
                <label for="category" class="form-label">Category</label>
                <select class="form-control" id="category" name="category" required>
                    <option value="">Select Category</option>
                    <option value="Interior" {% if product and product.category == 'Interior' %}selected{% endif %}>Interior</option>
                    <option value="Exterior" {% if product and product.category == 'Exterior' %}selected{% endif %}>Exterior</option>
                    <option value="Electronics" {% if product and product.category == 'Electronics' %}selected{% endif %}>Electronics</option>
                    <option value="Performance" {% if product and product.category == 'Performance' %}selected{% endif %}>Performance</option>
                    <option value="Safety" {% if product and product.category == 'Safety' %}selected{% endif %}>Safety</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="price" class="form-label">Price (₹)</label>
                <input type="number" class="form-control" id="price" name="price" step="0.01" min="0"
                       value="{% if product %}{{ product.price }}{% endif %}" required>
            </div>
            <div class="mb-3">
                <label for="image_url" class="form-label">Image URL</label>
                <input type="url" class="form-control" id="image_url" name="image_url" 
                       value="{% if product %}{{ product.image_url }}{% endif %}" placeholder="https://example.com/image.jpg">
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="4" required>{% if product %}{{ product.description }}{% endif %}</textarea>
            </div>
            <div class="mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="featured" name="featured" 
                           {% if product and product.featured %}checked{% endif %}>
                    <label class="form-check-label" for="featured">
                        Featured Product
                    </label>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-submit">
                    <i class="fas fa-save me-2"></i>{% if product %}Update Product{% else %}Add Product{% endif %}
                </button>
                <a href="/admin/dashboard" class="btn btn-back flex-grow-1">
                    <i class="fas fa-arrow-left me-2"></i>Back
                </a>
            </div>
        </form>
    </div>
</body>
</html>
